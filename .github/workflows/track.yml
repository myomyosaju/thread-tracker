name: Track Threads followers

on:
  schedule:
    # 무료 플랜 큐 지연 대비로 KST 8:30~10:00 사이 4번 분산 발동.
    # tracker.py가 "오늘 KST 기준 이미 실행됐으면 skip"을 처리한다.
    - cron: "30 23 * * *"  # UTC 23:30 = KST 08:30
    - cron: "0 0 * * *"    # UTC 00:00 = KST 09:00
    - cron: "30 0 * * *"   # UTC 00:30 = KST 09:30
    - cron: "0 1 * * *"    # UTC 01:00 = KST 10:00
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # CSV commit/push 권한

concurrency:
  group: tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run tracker
        run: python tracker.py

      - name: Commit & push if CSV changed
        run: |
          if git diff --quiet -- followers_data.csv; then
            echo "no changes"
            exit 0
          fi
          git config user.name  "threads-bot"
          git config user.email "bot@users.noreply.github.com"
          git add followers_data.csv
          git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
