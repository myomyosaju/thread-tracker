name: Track Threads followers

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 = KST 09:00
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # CSV commit/push 권한

concurrency:
  group: tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run tracker
        run: python tracker.py

      - name: Commit & push if CSV changed
        run: |
          if git diff --quiet -- followers_data.csv; then
            echo "no changes"
            exit 0
          fi
          git config user.name  "threads-bot"
          git config user.email "bot@users.noreply.github.com"
          git add followers_data.csv
          git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
