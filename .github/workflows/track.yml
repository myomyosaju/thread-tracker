name: Track Threads followers

on:
  schedule:
    # 3시간마다 실행 — KST 00, 03, 06, 09, 12, 15, 18, 21시.
    # GitHub Actions cron은 UTC 기준 → KST -9시간.
    - cron: "0 15 * * *"  # UTC 15:00 = KST 00:00
    - cron: "0 18 * * *"  # UTC 18:00 = KST 03:00
    - cron: "0 21 * * *"  # UTC 21:00 = KST 06:00
    - cron: "0 0 * * *"   # UTC 00:00 = KST 09:00
    - cron: "0 3 * * *"   # UTC 03:00 = KST 12:00
    - cron: "0 6 * * *"   # UTC 06:00 = KST 15:00
    - cron: "0 9 * * *"   # UTC 09:00 = KST 18:00
    - cron: "0 12 * * *"  # UTC 12:00 = KST 21:00
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # CSV commit/push 권한

concurrency:
  group: tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run tracker
        run: python tracker.py

      - name: Commit & push if CSV changed
        run: |
          if git diff --quiet -- followers_data.csv; then
            echo "no changes"
            exit 0
          fi
          git config user.name  "threads-bot"
          git config user.email "bot@users.noreply.github.com"
          git add followers_data.csv
          git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
